name: Build Rwandan Legal Parser
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf nuitka zstandard

      - name: Build Single File EXE
        # --include-package=fitz ensures the PDF logic is included
        # --enable-plugin=tk-inter ensures the UI logic is included
        run: |
          python -m nuitka --standalone --onefile --enable-plugin=tk-inter --windows-console-mode=disable --assume-yes-for-downloads --include-package=fitz src/main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rwandan-Legal-Parser-EXE
          path: "*.exe"